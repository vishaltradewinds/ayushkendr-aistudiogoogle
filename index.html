<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10b981" />
    <link rel="apple-touch-icon" href="/pwa-192x192.svg" />
    <title>AyushKendra | Medical & AYUSH Infrastructure Supply</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'hi,bn,te,mr,ta,ur,gu,kn,ml,pa,or,as,mai,sa,sd,ks,ne,doi,brx,mni,kok,sat,en',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: true
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="text/javascript">
      // Aggressively remove Google Translate banner and fix body positioning
      const observer = new MutationObserver((mutations) => {
        const elementsToRemove = document.querySelectorAll('.goog-te-banner-frame, .VIpgJd-ZVi9od-ORHb-OEVmcd, iframe.skiptranslate, #goog-gt-tt');
        elementsToRemove.forEach(el => el.remove());
        
        if (document.body && document.body.style.top !== '0px') {
          document.body.style.top = '0px';
          document.body.style.position = 'static';
          document.body.style.marginTop = '0px';
        }
        if (document.documentElement && document.documentElement.style.marginTop !== '0px') {
          document.documentElement.style.marginTop = '0px';
        }
      });
      
      document.addEventListener('DOMContentLoaded', () => {
        observer.observe(document.documentElement, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ['style']
        });
      });
    </script>
    <style>
      /* Hide the Google Translate toolbar */
      .goog-te-banner-frame.skiptranslate,
      .goog-te-banner-frame,
      iframe.goog-te-banner-frame,
      iframe.skiptranslate,
      iframe[name="goog_te_banner_frame"],
      .VIpgJd-ZVi9od-ORHb-OEVmcd,
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf,
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf-ti6hGc,
      body > .skiptranslate,
      #goog-gt-tt {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        height: 0 !important;
        width: 0 !important;
        overflow: hidden !important;
        position: absolute !important;
        z-index: -9999 !important;
      }
      body {
        top: 0px !important;
        position: static !important;
        margin-top: 0px !important;
        padding-top: 0px !important;
      }
      html {
        margin-top: 0px !important;
        padding-top: 0px !important;
        height: 100% !important;
        top: 0px !important;
        position: static !important;
      }
      /* Hide Google Translate tooltips and highlights */
      #goog-gt-tt, .goog-tooltip, .goog-tooltip:hover {
        display: none !important;
      }
      .goog-text-highlight {
        background-color: transparent !important;
        border: none !important;
        box-shadow: none !important;
      }
      /* Style the translate dropdown */
      #google_translate_element {
        opacity: 0;
        position: absolute;
        z-index: -1;
        pointer-events: none;
      }
      .goog-logo-link {
        display: none !important;
      }
      .goog-te-gadget {
        color: transparent !important;
        font-size: 0px;
      }
      .goog-te-gadget .goog-te-combo {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="google_translate_element"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
